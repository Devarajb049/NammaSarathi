<!doctype html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- Font Awesome Icons -->

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Custom stylesheet -->
  <link rel="stylesheet" href="../css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            },
            secondary: {
              50: '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
            }
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>

<body class="min-h-screen bg-secondary-50 text-secondary-900 flex antialiased">

  <!-- Auth Validation and Sidebar utilities -->
  <script src="../js/admin.js"></script>

  <!-- Mobile header menu -->
  <div class="fixed top-0 inset-x-0 bg-white shadow-sm h-14 flex items-center px-4 z-30 md:hidden justify-between">
    <button id="sidebar-toggle" class="p-2 bg-secondary-100 rounded-lg text-secondary-700 hover:bg-secondary-200">
      <i class="fa-solid fa-bars text-lg"></i>
    </button>
    <div class="flex items-center space-x-2">
      <i class="fa-solid fa-car text-primary-600 text-xl"></i>
      <span class="font-bold text-secondary-900 text-sm">NammaSarathi</span>
    </div>
    <div class="w-8"></div>
  </div>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 sidebar-overlay-transition md:hidden"></div>

  <!-- Navigation Sidebar Container -->
  <aside id="admin-sidebar"
    class="fixed md:static inset-y-0 left-0 z-40 w-64 bg-secondary-900 flex flex-col justify-between transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
    <div class="flex flex-col h-full">
      <div class="p-6 border-b border-secondary-800">
        <a href="../index.html" class="flex items-center space-x-2">
          <i class="fa-solid fa-car text-primary-400 text-2xl"></i>
          <span class="text-xl font-bold text-white">NammaSarathi</span>
        </a>
        <span class="text-xs text-secondary-400 mt-1 block">Admin Panel</span>
      </div>

      <nav class="flex-1 p-4">
        <ul class="space-y-2">
          <li>
            <a href="admin-dashboard.html"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-secondary-300 hover:bg-secondary-800 hover:text-white transition-colors">
              <i class="fa-solid fa-chart-line w-5"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="admin-bookings.html"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-secondary-300 hover:bg-secondary-800 hover:text-white transition-colors">
              <i class="fa-solid fa-calendar w-5"></i>
              <span>Bookings</span>
            </a>
          </li>
          <li>
            <a href="admin-drivers.html"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-secondary-300 hover:bg-secondary-800 hover:text-white transition-colors">
              <i class="fa-solid fa-users w-5"></i>
              <span>Drivers</span>
            </a>
          </li>
          <li>
            <a href="admin-schedule.html"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-white bg-primary-600 transition-colors">
              <i class="fa-solid fa-clock w-5"></i>
              <span>Schedule</span>
            </a>
          </li>
          <li>
            <a href="admin-settings.html"
              class="flex items-center gap-3 px-4 py-3 rounded-lg text-secondary-300 hover:bg-secondary-800 hover:text-white transition-colors">
              <i class="fa-solid fa-gear w-5"></i>
              <span>Settings</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="p-4 border-t border-secondary-800">
        <div class="px-4 py-2 mb-3">
          <p class="text-white text-sm font-medium">admin@gmail.com</p>
          <p class="text-secondary-400 text-xs">Administrator</p>
        </div>
        <button
          class="logout-btn flex items-center gap-3 px-4 py-3 w-full rounded-lg text-secondary-300 hover:bg-red-600 hover:text-white transition-colors">
          <i class="fa-solid fa-right-from-bracket"></i>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </aside>

  <!-- Main Workspace -->
  <main class="flex-1 p-6 md:p-10 pt-20 md:pt-10 overflow-y-auto min-h-screen fade-in">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold text-secondary-900 font-semibold">Duty Schedule Logs</h1>
        <p class="text-secondary-600 text-sm">Track driver assignments chronological calendar agenda logs.</p>
      </div>
    </div>

    <!-- Filters & Control Panel Card -->
    <div
      class="bg-white rounded-xl shadow-sm border border-secondary-200/50 p-6 mb-8 flex flex-col md:flex-row items-center gap-4">
      <!-- Search driver name -->
      <div class="relative w-full md:max-w-xs">
        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-secondary-400 text-sm"></i>
        <input type="text" id="driver-search" placeholder="Search by driver name..."
          class="w-full pl-9 pr-4 py-2 border border-secondary-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500" />
      </div>

      <!-- Filter date -->
      <div class="w-full md:w-auto">
        <select id="date-filter"
          class="w-full px-3 py-2 border border-secondary-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 bg-white">
          <option value="all">All Dates</option>
          <option value="today">Today's Assignments</option>
          <option value="upcoming">Upcoming Assignments</option>
        </select>
      </div>
    </div>

    <!-- Schedule Agenda Section -->
    <div id="schedule-timeline" class="space-y-8">
      <!-- Groups load dynamically via JS -->
    </div>
  </main>

  <!-- Logic Script -->
  <script>
    let driverQuery = '';
    let dateFilter = 'all';

    function loadScheduleAgenda() {
      const bookings = getBookings();
      const timeline = document.getElementById('schedule-timeline');
      timeline.innerHTML = '';

      // Only show assigned and active bookings (status === confirmed or completed)
      let activeBookings = bookings.filter(b => b.status === 'confirmed' || b.status === 'completed');

      // Apply filters
      if (driverQuery) {
        const query = driverQuery.toLowerCase();
        activeBookings = activeBookings.filter(b => b.driver && b.driver.toLowerCase().includes(query));
      }

      const todayStr = new Date().toISOString().split('T')[0];
      if (dateFilter === 'today') {
        activeBookings = activeBookings.filter(b => b.pickupDate === todayStr);
      } else if (dateFilter === 'upcoming') {
        activeBookings = activeBookings.filter(b => b.pickupDate >= todayStr);
      }

      if (activeBookings.length === 0) {
        timeline.innerHTML = `
            <div class="bg-white rounded-xl shadow-sm border border-secondary-200/50 p-12 text-center text-secondary-400">
              <i class="fa-solid fa-calendar-xmark text-4xl mb-3 block"></i>
              No active driver schedules found matching filters.
            </div>
          `;
        return;
      }

      // Sort chronologically
      activeBookings.sort((a, b) => {
        const dateDiff = a.pickupDate.localeCompare(b.pickupDate);
        if (dateDiff !== 0) return dateDiff;
        return a.pickupTime.localeCompare(b.pickupTime);
      });

      // Group by date
      const grouped = {};
      activeBookings.forEach(booking => {
        if (!grouped[booking.pickupDate]) {
          grouped[booking.pickupDate] = [];
        }
        grouped[booking.pickupDate].push(booking);
      });

      // Render groups
      for (const date in grouped) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'space-y-4';

        // Format Date Banner Heading
        const formattedDate = new Date(date).toLocaleDateString('en-US', {
          weekday: 'long',
          year: 'numeric',
          month: 'long',
          day: 'numeric'
        });

        groupDiv.innerHTML = `
            <h3 class="text-sm font-bold text-secondary-500 uppercase tracking-wider pl-2 border-l-4 border-primary-500">${formattedDate}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              ${grouped[date].map(booking => `
                <div class="bg-white rounded-xl shadow-sm border border-secondary-200/50 p-5 flex flex-col justify-between hover:shadow-md transition-shadow duration-200">
                  <div class="space-y-3">
                    <div class="flex justify-between items-center">
                      <span class="text-xs font-bold text-secondary-400">${booking.id}</span>
                      <span class="inline-flex px-2 py-0.5 rounded-full text-xs font-bold ${booking.status === 'completed' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'}">
                        ${booking.status.toUpperCase()}
                      </span>
                    </div>

                    <div class="flex items-center gap-3">
                      <div class="w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center text-primary-600 font-bold">
                        <i class="fa-solid fa-clock"></i>
                      </div>
                      <div>
                        <p class="font-bold text-secondary-900">${booking.pickupTime}</p>
                        <p class="text-xs text-secondary-500">Duration: ${booking.duration || 'Not specified'}</p>
                      </div>
                    </div>

                    <div class="space-y-1 text-sm text-secondary-600">
                      <p><strong class="text-secondary-800">Customer:</strong> ${booking.name} (${booking.phone})</p>
                      <p><strong class="text-secondary-800">Vehicle:</strong> ${booking.vehicleType.toUpperCase()}</p>
                      <p class="text-xs mt-2 text-secondary-500 flex items-center gap-1">
                        <i class="fa-solid fa-map-pin text-primary-500 text-[10px]"></i> ${booking.pickupLocation} 
                        <i class="fa-solid fa-arrow-right text-[10px] mx-1 text-secondary-400"></i> ${booking.dropLocation}
                      </p>
                    </div>
                  </div>

                  <div class="mt-4 pt-3 border-t border-secondary-100/50 flex justify-between items-center text-sm">
                    <span class="text-secondary-500 font-semibold">Assigned Driver:</span>
                    <span class="font-bold text-primary-600 flex items-center gap-1.5">
                      <i class="fa-solid fa-user-shield text-xs"></i> ${booking.driver}
                    </span>
                  </div>
                </div>w
              `).join('')}
            </div>
          `;
        timeline.appendChild(groupDiv);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadScheduleAgenda();

      // Listen search input
      document.getElementById('driver-search').addEventListener('input', (e) => {
        driverQuery = e.target.value;
        loadScheduleAgenda();
      });

      // Listen date select
      document.getElementById('date-filter').addEventListener('change', (e) => {
        dateFilter = e.target.value;
        loadScheduleAgenda();
      });
    });
  </script>
</body>

</html>
