<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded Shield Background -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#grad)" />
  
  <!-- Steering Wheel Symbol in White -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="#ffffff" stroke-width="6" />
  <line x1="50" y1="22" x2="50" y2="50" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <line x1="50" y1="50" x2="26" y2="64" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <line x1="50" y1="50" x2="74" y2="64" stroke="#ffffff" stroke-width="6" stroke-linecap="round" />
  <circle cx="50" cy="50" r="7" fill="#ffffff" />
</svg>
